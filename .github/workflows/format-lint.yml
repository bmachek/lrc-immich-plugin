name: Format & Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting with StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check immich-plugin.lrplugin

  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run luacheck
        uses: lunarmodules/luacheck@v1
        with:
          args: immich-plugin.lrplugin
