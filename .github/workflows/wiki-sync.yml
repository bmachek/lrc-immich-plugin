name: Sync Wiki from docs/wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create/update wiki pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync docs/wiki to GitHub Wiki via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          for f in docs/wiki/*.md; do
            [ -f "$f" ] || continue
            page_name=$(basename "$f" .md)
            echo "Syncing $page_name..."
            content=$(jq -Rs . < "$f")
            body=$(jq -n --arg title "$page_name" --argjson content "$content" '{title: $title, content: $content}')
            resp=$(curl -s -w "\n%{http_code}" -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GH_REPO/wiki/pages/$page_name" \
              -d "$body")
            http_code=$(echo "$resp" | tail -n1)
            body_only=$(echo "$resp" | sed '$d')
            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "  -> OK ($http_code)"
            else
              echo "  -> FAILED ($http_code) $body_only"
              exit 1
            fi
          done
          echo "Wiki sync complete."
